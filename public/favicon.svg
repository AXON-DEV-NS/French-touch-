<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="25%" stop-color="#FCF6BA" />
      <stop offset="50%" stop-color="#B38728" />
      <stop offset="75%" stop-color="#FBF5B7" />
      <stop offset="100%" stop-color="#AA771C" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,600&amp;family=Cinzel:wght@500&amp;display=swap');
      .title { font-family: 'Playfair Display', serif; font-size: 85px; font-weight: 600; font-style: italic; fill: url(#gold-grad); text-anchor: middle; }
      .subtitle { font-family: 'Cinzel', serif; font-size: 40px; font-weight: 500; fill: url(#gold-grad); text-anchor: middle; letter-spacing: 12px; }
    </style>
  </defs>

  <!-- Deep Blue Background Circular -->
  <rect width="500" height="500" rx="250" fill="#0b1021"/>
  
  <!-- Outer Decorative Golden Rings -->
  <circle cx="250" cy="250" r="235" fill="none" stroke="url(#gold-grad)" stroke-width="4"/>
  <circle cx="250" cy="250" r="220" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-dasharray="6 6"/>
  <circle cx="250" cy="250" r="205" fill="none" stroke="url(#gold-grad)" stroke-width="2"/>

  <!-- Elegant Star / Diamond Motif Top -->
  <g transform="translate(250, 110) scale(1.2)">
    <path d="M0,-25 L4,-6 L25,0 L4,6 L0,25 L-4,6 L-25,0 L-4,-6 Z" fill="url(#gold-grad)" />
    <circle cx="0" cy="0" r="3" fill="#0b1021"/>
  </g>

  <!-- Text: French -->
  <text x="250" y="240" class="title">French</text>
  
  <!-- Fancy Underline / Swirl -->
  <path d="M 160 265 Q 250 285 340 265" fill="none" stroke="url(#gold-grad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M 230 273 L 270 273" fill="none" stroke="url(#gold-grad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Text: Touch -->
  <text x="258" y="325" class="subtitle">TOUCH</text>

  <!-- Elegant Star / Diamond Motif Bottom -->
  <g transform="translate(250, 395) scale(0.8)">
    <path d="M0,-20 L3,-5 L20,0 L3,5 L0,20 L-3,5 L-20,0 L-3,-5 Z" fill="url(#gold-grad)" />
  </g>
</svg>
